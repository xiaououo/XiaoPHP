<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{$title}}</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;background:#f6f5f2;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:2rem}
        .card{position:fixed;top:2rem;left:2rem;padding:2rem 2.4rem;background:#fff;border-radius:12px;border:1px solid #e8e8e8;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        .greeting{font-size:2.6rem;font-weight:600;color:#1a1a1a;letter-spacing:-0.02em}
        .divider{display:block;width:2.4rem;height:2px;background:#d0d0d0;margin:.6rem 0 .8rem}
        .sub{font-size:.95rem;color:#6b6b6b}
        @media(max-width:600px){body{padding:1.2rem}.card{top:1.2rem;left:1.2rem;padding:1.4rem 1.6rem}.greeting{font-size:2rem}.sub{font-size:.85rem}}
        @media(max-width:420px){.card{padding:1rem 1.2rem;top:.8rem;left:.8rem}.greeting{font-size:1.6rem}.sub{font-size:.75rem}.divider{width:1.6rem}}
    </style>
</head>
<body>
    <div class="card">
        <h1 class="greeting">{{$title}}</h1>
        <span class="divider"></span>
        <span class="sub">{{$h1}}</span>
    </div>
</body>
</html>
